<!DOCTYPE html>
<html>
<head>
<title>JQuery HTML DOM</title>
<script src="jquery-3.4.1.min.js"></script>
<script>
	$(document).ready(function() {
		$("button#app").click(function() {
			$("p").append(" <b>APPEND</b>");
		});
		$("button#aft").click(function() {
			$("p").after(" <b>AFTER</b>");
		});
		$("button#pre").click(function() {
			$("p").prepend(" <b>PREPEND</b>");
		});
		$("button#bef").click(function() {
			$("p").before(" <b>BEFORE</b>");
		});
	});
</script>
</head>

<body>
	<h2>This is a heading</h2>
	<p>This is a paragraph.</p>
	<hr />
	<button id="app">Try append()</button>
	<button id="aft">Try after()</button>
	<button id="pre">Try prepend()</button>
	<button id="bef">Try before()</button>
</body>
</html>
