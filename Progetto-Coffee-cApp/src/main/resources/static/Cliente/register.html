<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>client_registration</title>
    <link rel="stylesheet" href="../CSS-e-Icone/login.css">
</head>
<body>
    <div class="container">

        <div class="sinistra">
            <img src="../CSS-e-Icone/coffee_cup_icon.png" alt=""/>
            <p>Il gusto del <strong>caffé</strong>, la semplicità di un’<strong>app</strong></p>
        </div>

        <div class="destra">
            <p>Crea un nuovo account <strong>Coffee App</strong></p>
            <div class="login-form">
                <form action="http://localhost:8080/register" method="post">
                    <label for="nome"></label><input type="text" name="nome" id="nome" placeholder="Nome" required><br>
                    <label for="cognome"></label><input type="text" name="cognome" id="cognome" placeholder="Cognome" required><br>
                    <label for="email"></label><input type="email" name="email" id="email" placeholder="Email" required><br>
                    <label for="password"></label><input type="password" name="password" id="password" placeholder="Password" required><br><br>
                    <button type="submit">Registrati</button>
                </form>

            </div>
        </div>
    </div>
</body>
</html>
