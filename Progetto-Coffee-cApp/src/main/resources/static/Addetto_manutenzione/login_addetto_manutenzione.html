<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>addetto_login</title>
    <link rel="stylesheet" href="../CSS-e-Icone/login.css">
</head>
<body>
    <div class="container">

        <div class="sinistra">
            <img src="../CSS-e-Icone/wrench-svgrepo-com.svg" alt="" height="300px" style="padding: 30px;">
            <p>Il gusto del <strong>caffé</strong>, la semplicità di un’<strong>app</strong></p>
        </div>

        <div class="destra">
            <p>Accedi al tuo account <strong>Coffee App</strong>: Manutentore</p>
            <div class="login-form">
                <form method="post" action="http://localhost:8080/login-manutentore">
                    <label for="username"></label>
                    <input type="text" name="username" id="username" placeholder="Username" required><br>

                    <label for="password"></label>
                    <input type="password" name="password" id="password" placeholder="Password"><br><br>

                    <button type="submit">Accedi</button>
                </form>

            </div>
        </div>
    </div>
</body>
</html>
