<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee cApp - Landing</title>

    <link rel="icon" type="image/png" href="/CSS-e-Icone/coffee_bean.png" />
    <link rel="stylesheet" href="/CSS-e-Icone/landing_page.css" />
</head>
<body>

<div class="container">
    <header class="header">
        <div class="brand">
            <h1 class="title">Coffee cApp</h1>
            <p class="subtitle">Seleziona l'area di accesso</p>
        </div>
        <img class="logo" src="/CSS-e-Icone/coffee_bean.png" alt="Coffee" />
    </header>

    <main class="content">
        <section class="section section-primary" aria-labelledby="dispenser-title">
            <div class="section-head">
                <div>
                    <h2 id="dispenser-title" class="section-title">Interfaccia distributore</h2>
                    <p class="section-desc">Inserisci l'ID del distributore da aprire</p>

                    <form action="/interfaccia-distributore" class="form-row" method="get" target="_blank">
                        <label for="idDistributore"></label>
                        <input name="idDistributore" type="text" id="idDistributore" placeholder="CA001" pattern="CA\d{3}" required>
                        <button id="btnApriDistributore" class="btn btn-primario btn-int" type="submit">Apri interfaccia</button>
                    </form>
                </div>
            </div>


            <img class="section-icon" src="/CSS-e-Icone/vending-machine-icon.png" alt="Distributore" />
        </section>

        <div class="divider" aria-hidden="true"></div>

        <section class="section" aria-label="Aree applicazione">
            <div class="grid">
                <a class="btn btn-secondary" href="/Cliente/login.html" target="_blank">
                    <span class="btn-text">Area clienti</span>
                    <img class="btn-icon" src="/CSS-e-Icone/coffee-cup-icon.png" alt="" />
                </a>

                <a class="btn btn-secondary" href="/Addetto_manutenzione/login_addetto_manutenzione.html" target="_blank">
                    <span class="btn-text">Area addetto</span>
                    <img class="btn-icon" src="/CSS-e-Icone/wrench-svgrepo-com.svg" alt="" />
                </a>

                <a class="btn btn-secondary" href="/Gestore_sistema/login_gestore_sistema.html" target="_blank">
                    <span class="btn-text">Area gestore</span>
                    <img class="btn-icon" src="/CSS-e-Icone/key-manager-svgrepo-com.svg" alt="" />
                </a>
            </div>
        </section>
    </main>
</div>

</body>
</html>
