<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connessione Distributore</title>
    <link rel="stylesheet" href="/Cliente/connessione_distributore_style.css">
    <link rel="stylesheet" th:href="@{/Cliente/connessione_distributore_style.css}">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

    <script src="/Cliente/gestione_pulsanti.js" defer></script>
    <script src="/Cliente/gestione_credito.js" defer></script>
    <script src="/Cliente/gestione_mappa.js" defer></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
</head>
<body>
<div class="contenitore">
    <div class="intestazione">
        <div class="info-utente">
            <div class="etichetta-credito">Credito Disponibile</div>
            <p class="euro_simbolo">€ <span class="credito" th:text="${utente.credito_residuo}">0</span></p>
            <div class="nome-utente" th:text="${utente.nome + ' ' + utente.cognome}">Nome Utente</div>
            <!-- Div per mostrare il distributore connesso -->
            <div id="status-connessione" style="margin-top: 10px; font-size: 0.9em; color: #4CAF50; display: none;">
                Connesso a: <strong id="id-connesso">---</strong>
            </div>
        </div>
        <img th:src="@{/CSS-e-Icone/coffee_bean.png}" height="100" alt="Chicco"/>
    </div>

    <div class="contenuto">
        <div class="sezione">
            <h2 class="titolo-sezione">Connessione</h2>
            <form id="form-connessione">
                <input type="hidden" id="id_utente_hidden" th:value="${utente.id_utente}">
                <div class="gruppo-form">
                    <label for="id-distributore">ID Distributore</label>
                    <input type="text" id="id-distributore" placeholder="CA001" pattern="CA\d{3}" required>
                </div>
                <button id="conn" type="submit" class="btn btn-primario">Connetti</button>
            </form>
        </div>

        <div class="divisore"></div>

        <div class="sezione">
            <h2 class="titolo-sezione">Disconnessione</h2>
            <button id="disconnessione-btn" type="button" class="btn btn-pericolo">
                <span style="display:inline-flex; align-items:center;">
                    <img src="https://img.icons8.com/ios-glyphs/30/ffffff/logout-rounded--v1.png" alt="logout" style="height:20px; width:20px;"/>
                    <span style="margin-left:5px;">Scollega Distributore</span>
                </span>
            </button>
        </div>

        <div class="divisore"></div>

        <div class="sezione">
            <h2 class="titolo-sezione">Ricarica</h2>
            <form id="form-ricarica">
                <div class="gruppo-form">
                    <label for="importo">Importo (€)</label>
                    <input type="number" id="importo" name="importo" placeholder="0.00" min="1" step="0.50" required>
                </div>
                <button id="ricarica-btn" type="submit" class="btn btn-successo">Effettua Ricarica</button>
            </form>
        </div>

        <div class="divisore"></div>

        <div class="sezione">
            <h2 class="titolo-sezione">Mappa Distributori</h2>
            <button id="btn-mostra-mappa" type="button" class="btn btn-primario">Mostra Mappa Distributori</button>
            <div id="map-container" style="display: none; margin-top: 15px;">
                <div id="map" style="height: 400px; width: 100%; border-radius: 8px;"></div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
