<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>addetto_login</title>
    <link rel="stylesheet" href="../CSS-e-Icone/login.css">
</head>
<body>
    <div class="container">

        <div class="sinistra">
            <img src="../CSS-e-Icone/wrench-svgrepo-com.svg" alt="" height="300px" style="padding: 30px;">
            <p>Il gusto del <strong>caffé</strong>, la semplicità di un’<strong>app</strong></p>
        </div>

        <div class="destra">
            <p>Accedi al tuo account <strong>Coffee App</strong>: Manutentore</p>
            <div class="login-form">
                <form method="post">
                    <label for="email"></label>
                    <input type="email" name="email" id="email" placeholder="Email" required><br>

                    <label for="password"></label>
                    <input type="password" name="password" id="password" placeholder="Password" required><br><br>

                    <button type="button" onclick="LoginSubmit()">Accedi</button>
                    <script>
                        function LoginSubmit() {
                            const form = document.querySelector('.login-form form');
                            if (form.reportValidity()){
                                window.location.href = "controllo_distributore.html";
                            }
                        }
                    </script>
                </form>

            </div>
        </div>
    </div>
</body>
</html>
