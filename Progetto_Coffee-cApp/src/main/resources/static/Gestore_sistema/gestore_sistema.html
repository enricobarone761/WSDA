<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport">
    <title>Dashboard Gestore Sistema</title>
    <link rel="stylesheet" href="gestore_sistema_style.css">
    <script src="gestione_manutentori.js" defer></script>
    <script src="gestione_distributori.js" defer></script>
    <script src="ricerca_distributori.js" defer></script>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {

            $('#add-dist-form').hide()
            $("#add-dist-title").click(function() {
                $("#add-dist-form").slideToggle(200);
            });

            //$('#search-dist-form').hide()
            $("#search-dist-title").click(function() {
                $("#search-dist-form").slideToggle(200);
            });

        });
    </script>

</head>
<body>
<div class="dashboard-container">
    <header class="dashboard-header">
        <h1>Pannello Amministrazione</h1>
    </header>
    <main class="dashboard-main">

        <!-- SEZIONE GESTIONE ADDETTI MANUTENZIONE -->
        <section class="dashboard-section">
            <h2 class="section-title">Gestione Addetti Manutenzione</h2>
            <!-- Form per aggiungere -->
            <div class="form-section add-section">
                <h3>Aggiungi Addetto</h3>
                <form>
                    <label for="addetto-nome">Nome</label>
                    <input type="text" id="addetto-nome" placeholder="Mario" required>

                    <label for="addetto-cognome">Cognome</label>
                    <input type="text" id="addetto-cognome" placeholder="Rossi" required>

                    <label for="addetto-email">Email</label>
                    <input type="email" id="addetto-email" placeholder="mario@email.com" required>

                    <button id="agg-add" type="submit" class="btn btn-success">Aggiungi Addetto</button>
                </form>
            </div>

            <!-- Lista manutentori -->
            <div class="manutentori-list">
                <!-- dati inseriti con js -->
            </div>
        </section>

        <!-- SEZIONE GESTIONE DISTRIBUTORI -->
        <section class="dashboard-section">
            <h2 class="section-title">Gestione Distributori</h2>

            <!-- Form per aggiungere distributore -->
        <div class="form-section add-section">
            <button id="add-dist-title" type="button" class="toggle-btn">
                <span class="toggle-text">Aggiungi Distributore</span>
                <img src="../CSS-e-Icone/search-magnifying-glass-svgrepo-com.svg" alt="cerca" class="toggle-icon">
            </button>
             <form id="add-dist-form">

                <div class="input-row">
                    <div class="input-group">
                        <label for="add-distributore-id">ID</label>
                        <input type="text" id="add-distributore-id" placeholder="CA005" required>
                    </div>

                    <div class="input-group">
                        <label for="add-distributore-edificio">Edificio</label>
                        <input type="text" id="add-distributore-edificio" placeholder="Edificio A" required>
                    </div>

                    <div class="input-group">
                        <label for="add-distributore-piano">Piano</label>
                        <input type="text" id="add-distributore-piano" placeholder="Piano 2" required>
                    </div>
                </div>

                <button id="add-dist-btn" type="submit" class="btn btn-success">Aggiungi Distributore</button>
            </form>
        </div>

            <!-- Form per ricerca distributore -->
        <div class="form-section add-section">
            <button id="search-dist-title" type="button" class="toggle-btn">
                <span class="toggle-text">Ricerca Distributore</span>
                <img src="../CSS-e-Icone/search-magnifying-glass-svgrepo-com.svg" alt="cerca" class="toggle-icon">
            </button>
             <form id="search-dist-form">

                <div class="input-row">
                    <div class="input-group">
                        <label for="search-distributore-id">ID</label>
                        <input type="text" id="search-distributore-id" name="distributore-id" placeholder="CA005">
                    </div>

                    <div class="input-group">
                        <label for="search-distributore-edificio">Edificio</label>
                        <input type="text" id="search-distributore-edificio" name="distributore-edificio" placeholder="5">
                    </div>

                    <div class="input-group">
                        <label for="search-distributore-stato">Stato</label>
                        <select id="search-distributore-stato" name="distributore-stato">
                            <option value=""> </option>
                            <option value="attivo">Attivo</option>
                            <option value="inattivo">Inattivo</option>
                        </select>
                    </div>
                </div>

                <div class="filter-buttons-row">
                    <button id="search-dist-low-stock-btn" type="button" class="btn btn-warning">
                        Forniture <50%
                    </button>
                    <button id="search-dist-fault-btn" type="button" class="btn btn-danger">
                        Distributori con Guasto
                    </button>
                </div>

                <button id="search-dist-btn" type="submit" class="btn btn-success">Cerca Distributore</button>
            </form>
        </div>

            <!-- Lista distributori -->
            <div class="distributori-list"><!-- dati inseriti con js --></div>
        </section>

    </main>
</div>
</body>
</html>
