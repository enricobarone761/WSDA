<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>client_login</title>
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>
    <div class="container">

        <div class="sinistra">
            <img src="../CSS/icona-della-tazza-di-caffe_118813-5777-removebg-preview.png" alt="">
            <p>Il gusto del <strong>caffé</strong>, la semplicità di un’<strong>app</strong></p>
        </div>

        <div class="destra">
            <p>Accedi al tuo account <strong>Coffee App</strong></p>
            <div class="login-form">
                <form method="post">
                    <label for="email"></label><input type="email" name="email" id="email" placeholder="Email"><br>
                    <label for="password"></label><input type="password" name="password" id="password" placeholder="Password"><br><br>
                    <button type="submit">Accedi</button>
                </form>

            </div>
        </div>
    </div>
</body>
</html>
