<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributore - Bevande</title>
    <link rel="stylesheet" href="style_distributore.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="user-info">
            <div class="user-label">Utente Connesso</div>
            <div class="username">Enrico Barone</div>
            <div class="credit">€ 25,50</div>
        </div>
    </div>

    <div class="content">
        <div class="section">
            <h2 class="section-title">Seleziona Bevanda</h2>

            <div class="bevande-grid">
                <div class="bevanda-card">
                    <div class="bevanda-nome">Caffè</div>
                    <div class="bevanda-prezzo">€ 0,80</div>
                    <button class="btn-bevanda">Seleziona</button>
                </div>

                <div class="bevanda-card">
                    <div class="bevanda-nome">Cappuccino</div>
                    <div class="bevanda-prezzo">€ 1,20</div>
                    <button class="btn-bevanda">Seleziona</button>
                </div>

                <div class="bevanda-card">
                    <div class="bevanda-nome">Tè</div>
                    <div class="bevanda-prezzo">€ 0,70</div>
                    <button class="btn-bevanda">Seleziona</button>
                </div>

                <div class="bevanda-card">
                    <div class="bevanda-nome">Cioccolata</div>
                    <div class="bevanda-prezzo">€ 1,50</div>
                    <button class="btn-bevanda">Seleziona</button>
                </div>

                <div class="bevanda-card">
                    <div class="bevanda-nome">Latte Macchiato</div>
                    <div class="bevanda-prezzo">€ 1,00</div>
                    <button class="btn-bevanda">Seleziona</button>
                </div>

                <div class="bevanda-card">
                    <div class="bevanda-nome">Ginseng</div>
                    <div class="bevanda-prezzo">€ 0,90</div>
                    <button class="btn-bevanda">Seleziona</button>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section">
            <h2 class="section-title">Quantità Zucchero</h2>

            <div class="zucchero-controls">
                <button class="btn-zucchero">0</button>
                <button class="btn-zucchero">0,5</button>
                <button class="btn-zucchero">1</button>
                <button class="btn-zucchero">1,5</button>
                <button class="btn-zucchero">2</button>
                <button class="btn-zucchero">2,5</button>
                <button class="btn-zucchero">3</button>
                <button class="btn-zucchero">3,5</button>
                <button class="btn-zucchero">4</button>
                <button class="btn-zucchero">4,5</button>
                <button class="btn-zucchero">5</button>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section">
            <button class="btn-conferma">Conferma Acquisto</button>
        </div>
    </div>
</div>
</body>
</html>
