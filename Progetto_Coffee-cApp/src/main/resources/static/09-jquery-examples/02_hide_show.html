<!DOCTYPE html>
<html>
<head>
<title>jQuery hide/show</title>
<script src="jquery-3.4.1.min.js"></script>
<script>
	$(document).ready(function() {
		$("#hide").click(function() {
			$("p").hide(500);
		});
		$("#show").click(function() {
			$("p").show(1000);
		});
	});
</script>
</head>
<body>
	<h1>Hide/show</h1>
	<p>If you click on the "Hide" button, I will disappear.</p>
	<div>Prova</div>
	<p>If you click on the "Hide" button, I will disappear.</p>
	<button id="hide">Hide</button>
	<button id="show">Show</button>
	<p>If you click on the "Hide" button, I will disappear.</p>
</body>
</html>
