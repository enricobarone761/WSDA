<!DOCTYPE html>
<html>
<head>
<title>jQuery popup menu</title>
<script src="jquery-3.4.1.min.js"></script>
<script>
	$(document).ready(function() {
		$("button#remove").click(removeCurrentItem);
		$("button#add").click(addNewItem);
	});
	function removeCurrentItem() {
		$('#myMenu option:selected').remove();
	}
	function addNewItem() {
		var t = $("#newitem").val();
		if (t != "") {
			var o = $("<option></option>").text(t);
			$("#myMenu").append(o);
		}
	}
</script>
</head>
<body>
	<select id="myMenu">
		<option>Mario</option>
		<option>Luigi</option>
	</select>
	<input type="text" id="newitem" />
	<button id="remove">Remove</button>
	<button id="add">Add</button>
</body>
</html>
