<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>client_registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="sinistra">
            <img src="icona-della-tazza-di-caffe_118813-5777-removebg-preview.png" alt="">
            <h1>Prova adesso il nostro caffè</h1>
            <p>Non te ne pentirai</p>
        </div>

        <div class="destra">
            <div class="login-form">
                <h2>Registrazione</h2><br><br><br>
                <form method="post">
                    <label for="nome"></label><input type="text" name="nome" id="nome" value="Nome"><br>
                    <label for="cognome"></label><input type="text" name="cognome" id="cognome" value="Cognome"><br>
                    <label for="email"></label><input type="email" name="email" id="email" value="Email"><br>
                    <label for="password"></label><input type="password" name="password" id="password" value="Password"><br><br>
                    <label for="remember"></label><input type="checkbox" name="remember" id="remember" value="Ricordami"> Ricordami<br><br>
                    <button type="submit">Registrati</button>
                </form>

            </div>
        </div>
    </div>
</body>
</html>
