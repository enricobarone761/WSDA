<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Distributore</title>
    <link rel="stylesheet" href="main_page.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="user-info">
            <div class="credit-label">Credito Disponibile</div>
            <div class="credit">€ 25,50</div>
            <div class="username">Mario Rossi</div>
        </div>
        <img src="../CSS/coffee_bean.png" height="100" alt="Coffee bean"/>
    </div>

    <div class="content">
        <div class="section">
            <h2 class="section-title">Connessione</h2>
            <div class="status status-disconnected">
                Nessun distributore connesso
            </div>
            <form>
                <div class="form-group">
                    <label for="distributor-id">ID Distributore</label>
                    <input type="text" id="distributor-id" placeholder="Inserisci ID" required>
                </div>
                <button type="submit" class="btn btn-primary">Connetti</button>
            </form>
        </div>

        <div class="divider"></div>

        <div class="section">
            <h2 class="section-title">Disconnessione</h2>
            <button type="button" class="btn btn-danger">Scollega Distributore</button>
        </div>

        <div class="divider"></div>

        <div class="section">
            <h2 class="section-title">Ricarica</h2>
            <form>
                <div class="form-group">
                    <label for="amount">Importo (€)</label>
                    <input type="number" id="amount" placeholder="0.00" min="5" step="0.50" required>
                </div>
                <button type="submit" class="btn btn-success">Effettua Ricarica</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
