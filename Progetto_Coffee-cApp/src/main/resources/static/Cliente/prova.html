<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
    .back{
        display: flex;
        flex-direction: row;
        align-items: start;
        width: 120px;
        padding: 5px;
        border-radius: 50px;
        background-color: rgb(29, 55, 104);
    }
    .btn{
        width: 50px;
        height: 50px;
        border-radius: 50px;
        background-color: GREEN;
    }
    .btn:hover{
        align-items: end;
    }
    </style>
</head>
<body>
<h2>Basic Toggle Switch</h2>

<div class="back">
    <div class="btn"></div>
</div>
</body>
</html>
