<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A Sample Form using POST</title>
</head>
<h1>A Sample Form using POST</h1>
<form action="../ShowParameters" method="get">
	Item Number: <input type="text" name="itemNum"><br />
	Description: <input type="text" name="description"><br />
	Price Each: <input type="text" name="price" value="$"><br />
	<hr />
	First name: <input type="text" name="firstName"><br /> Last
	name: <input type="text" name="lastName"><br /> Middle
	Initial: <input type="text" name="initial"><br /> Shipping
	Address:
	<textarea name="address" ROWS=3 COLS=40></textarea>
	<br /> Credit Card:<br /> <input type="RADIO" name="cardType"
		value="Visa">Visa<br /> <input type="RADIO" name="cardType"
		value="MasterCard">MasterCard<br /> <input type="RADIO"
		name="cardType" value="Amex">American Express<br /> <input
		type="RADIO" name="cardType" value="Discover">Discover<br />
	<input type="RADIO" name="cardType" value="Java SmartCard">Java
	SmartCard<br /> Credit Card Number: <input type="password"
		name="cardNum"><br /> Repeat Credit Card Number: <input
		type="password" name="cardNumVerification"><br />
	<br /> <input type="submit" value="Submit Order">
</form>
</body>
</html>
